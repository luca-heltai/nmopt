name: deal.II CI

on:
  push:
    branches: [main]
    paths:
      - "codes/dealii/**"
      - ".github/workflows/dealii-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "codes/dealii/**"
      - ".github/workflows/dealii-tests.yml"

jobs:
  debug:
    runs-on: ubuntu-latest
    container:
      image: dealii/dealii:v9.7.1-noble
      options: --user root
    defaults:
      run:
        working-directory: codes/dealii

    steps:
      - uses: actions/checkout@v4
      - name: Test debug
        run: |
          rm -rf build_linux_debug
          mkdir build_linux_debug
          cd build_linux_debug
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Debug
          ninja
          ctest -N
          ctest --output-on-failure
          cd gtests
          ./gtests.g

  release:
    runs-on: ubuntu-latest
    container:
      image: dealii/dealii:v9.7.1-noble
      options: --user root
    defaults:
      run:
        working-directory: codes/dealii

    steps:
      - uses: actions/checkout@v4
      - name: Test release
        run: |
          rm -rf build_linux_release
          mkdir build_linux_release
          cd build_linux_release
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release
          ninja
          ctest -N
          ctest --output-on-failure
          cd gtests
          ./gtests
